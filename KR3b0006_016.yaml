body:
  text: 束伍令束伍之令曰五人為伍共一符收於將吏之所亡伍而得伍當之得伍而不亡有賞亡伍不得伍身死家殘亡長得長當之得長不亡有賞亡長不得長身死家殘復戰得首長除之亡將得將當之得將不亡有賞亡將不得將坐離地遁逃之法戰誅之法曰什長得誅十人伯長得誅什長千人之將得誅百人之長萬人之將得誅千人之將左右將軍得誅萬人之將大將軍無不得誅
