body:
  text: 天官梁惠王問尉繚子曰吾聞黃帝有刑德可以百戰百勝其有之乎尉繚子對曰不然黃帝所謂刑德者刑以伐之德以守之非世之所謂刑德也世之所謂刑德者天官時日陰陽向背者也黃帝者人事而已矣何者今有城於此從其東西攻之不能取從其南北攻之不能取四方豈無順時乘之者邪然不能取者何城高池深兵器備具財穀多積豪士一謀者也若乃城下池淺守弱則取之矣由是觀之天官時日不若人事也案天官曰背水陳者為絕地向阪陳者為廢軍武王之伐紂也背濟水向山阪而陳以二萬二千五百人擊紂之億萬而滅商豈紂不得天官之陳哉然不得勝者何人事不得也楚將公子心與齊人戰時有彗星出柄在齊柄所在勝不可擊公子心曰彗星何知以彗鬭者固倒而勝焉明日與齊戰大破之黃帝曰先神先鬼先稽我智謂之天時人事而已
