body:
  text: 制談凡兵制必先定制先定則士不亂士不亂則刑乃明金鼓所指則百人盡鬭陷行亂陳則千人盡鬭覆軍殺將則萬人齊刃天下莫能當其戰矣古者士有什伍車有偏列鼓鳴旗麾先登者未嘗非多力國士也先死者亦未嘗非多力國士也損敵一人而損我百人此資敵而傷我甚焉世將不能禁征役分軍而逃歸或臨戰自北則逃傷甚焉世將不能禁殺人於百步之外者弓矢也殺人於五十步之內者矛戟也將已鼓而士卒相囂拗矢折矛抱戟利後發戰有此數者內自敗也世將不能禁士失什伍車失偏列奇兵捐將而走大衆亦走世將不能禁夫將能禁此四者則高山陵之深水絶之堅陳犯之不能禁此四者猶亡舟楫絶江河不可得也民非樂死而惡生也號令明法制審故能使之前明賞於前決罰於後是以發能中利動則有功今百人一卒千人一司馬萬人一將以少誅衆以弱誅強試聽臣言其術足使三軍之衆誅一人無失刑父不敢舍子子不敢舍父況國人乎一賊仗劍擊於市萬人無不避之者臣謂非一人之獨勇萬人皆不肖也何則必死與必生固不侔也聽臣之術足使三軍之衆為一死賊莫當其前莫隨其後而能獨出獨入焉獨出獨入者王霸之兵也有提十萬之衆而天下莫當者誰曰桓公也有提七萬之衆而天下莫當者誰曰吳起也有提三萬之衆而天下莫當者誰曰武子也今天下諸國士所率無不及二十萬之衆然不能濟功名者不明乎禁舍開塞也明其制一人勝之則十人亦以勝之也十人勝之則百千萬人亦以勝之也故曰便吾器用養吾武勇發之如鳥擊如赴千仞之溪今國被患者以重寶出聘以愛子出質以地界出割得天下助卒名為十萬其實不過數萬爾其兵來者無不謂其將曰無為天下先戰其實不可得而戰也量吾境內之民無伍莫能正矣經制十萬之衆而王必能使之衣吾衣食吾食戰不勝守不固者非吾民之罪內自致也天下諸國助我戰猶良驥騄耳之駛彼駑馬鬐興角逐何能紹吾氣哉吾用天下之用為用吾制天下之制為制修吾號令明吾刑賞使天下非農無所得食非戰無所得爵使民揚臂爭出農戰而天下無敵矣故曰發號出令信行國內民言有可以勝敵者毋許其空言必試其能戰也視人之地而有之分人之民而畜之必能內有其賢者也不能內有其賢而欲有天下必覆軍殺將如此雖戰勝而國益弱得地而國益貧由國中之制弊矣
