body:
  text: 兵談量土地肥墝而立邑建城以城稱地以地稱人以人稱粟三相稱則內可以固守外可以戰勝戰勝於外備主於內勝備相應猶合符節無異故也治兵者若祕於地若邃於天生於無故關之大不窕小不恢明乎禁舍開塞民流者親之地不任者任之夫土廣而任則其國不得無富民衆而治則其國不得無治富治者民不發軔甲不暴出而威制天下故曰兵勝於朝廷不暴甲而勝者主勝也陳而勝者將勝也兵起非可以忿也見勝則興不見勝則止患在百里之內不起一日之師患在千里之內不起一月之師患在四海之內不起一歲之師將者上不制於天下不制於地中不制於人寬不可激而怒清不可事以財夫心狂目盲耳聾以三悖率人者難矣兵之所及羊腸亦勝鋸齒亦勝緣山亦勝入谷亦勝方亦勝圓亦勝重者如山如林如江如河輕者如炮如燔如漏如潰如堵垣壓之如雲霓覆之令之聚不得以散散不得以聚左不得以右右不得以左兵如總木弩如羊角人人無不騰陵張膽絶乎疑慮堂堂決而去
