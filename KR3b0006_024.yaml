body:
  text: 兵令下諸去大軍為前禦之備者邊縣列候各相去三五里聞大軍為前禦之備戰則皆禁行所以安內也內卒出戍令將吏授旗鼓戈甲發日後將吏及出縣封界者以坐後戍法兵戍邊一歲遂亡不候代者法比亡軍父母妻子知之與同罪弗知赦之卒後將吏而至大將所一日父母妻子盡同罪卒逃歸至家一日父母妻子弗捕執及不言亦同罪諸戰而亡其將吏者及將吏棄卒獨北者盡斬之前吏棄其卒而北後吏能斬之而奪其卒者賞軍無功者戍三歲三軍大戰若大將死而從吏五百人已上不能死敵者斬大將左右近卒在陳中者皆斬餘士卒有軍功者奪一級無軍功者戍三歲戰亡伍人及伍人戰死不得其尸同伍盡奪其功得其尸罪皆赦軍之利害在國之名實今名在官而實在家官不得其實家不得其名聚卒為軍有空名而無實外不足以禦敵內不足以守國此軍之所以不給將之所以奪威也臣以謂卒逃歸者同舍伍人及吏罰入糧為饒名為軍實是有一軍之名而有二實之出國內空虛自竭民歲曷以免奔北之禍乎今以法止逃歸禁亡軍是兵之一勝也什伍相聯及戰鬭則卒吏相救是兵之二勝也將能立威卒能節制號令明信攻守皆得是兵之三勝也臣聞古之善用兵者能殺卒之半其次殺其十三其下殺其十一能殺其半者威加海內殺十三者力加諸侯殺十一者令行士卒故曰百萬之衆不用命不如萬人之鬭也萬人之鬭不如百人之奮也賞如日月信如四時令如斧鉞利如干將士卒不用命者未之有也
