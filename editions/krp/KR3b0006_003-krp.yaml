body:
  text: 尉繚子卷三周尉繚撰治本第十一凡治人者何曰非五穀無以充腹非絲麻無以葢形故充腹有粒葢形有縷夫在芸耨妻在機杼民無二事則有儲蓄夫無雕文刻鏤之事女無繡飾纂組之作木器液金器腥聖人飲于土食于土故埏埴以為器天下無費今也金木之性不寒而衣繡飾馬牛之性食草飲水而給菽粟是治失其本而宜設之制也春夏夫出于南畝秋冬女練于布帛則民不困今裋褐不蔽形糟糠不充腹失其治也古者土無肥磽人無勤惰古人何得而今人何失耶耕有不終畝織有日㫁機而奈何饑寒葢古治之行今治之止也夫所謂治者使民無私也民無私則天下為一家而無私耕私織共寒其寒共饑其饑故如有子十人不加一飯有子一人不損一飯焉有喧呼耽酒以敗善類乎民有輕佻則欲心興爭奪之患起矣横生于一夫則民私飯有儲食私用有儲財民一犯禁而拘以刑治烏在其為人上也善政執其制使民無私為下不敢私則無為非者矣反本緣理出乎一道則欲心去爭奪止囹圄空野充粟多安民懷逺外無天下之難内無暴亂之事治之至也蒼蒼之天莫知其極帝王之君誰能法則往世不可及來世不可待求己者也所謂天子者四焉一曰神明二曰垂光三曰洪敘四曰無敵此天子之事也野物不為犧牲雜學不為通儒今說者曰百里之海不能飲一夫三尺之泉足止三軍渴臣謂欲生于無度邪生於無禁大上神化其次因物其下在于無奪民時無損民財夫禁必以武而成賞必以文而成戰權第十二兵法曰千人而成權萬人而成武權先加人者敵不力交武先加人者敵無威接故兵貴先勝於此則勝彼矣弗勝於此則弗勝彼矣凡我往則彼來彼來則我往相為勝敗此戰之理然也夫精誠在乎神明戰權在乎道之所極有者無之無者有之安所信之先王之所傳聞者任正去詐存其慈順決無留刑故知道者必先圗不知止之敗惡在乎必往有功輕進而求戰敵復圗止我往而敵制勝矣故兵法曰求而從之見而加之主人不敢當而陵之必喪其權凡奪者無氣恐者不可守敗者無人兵無道也意往而不疑則從之奪敵而無前則加之明視而髙居則威之兵道極矣其言無謹偷失其陵犯無節破矣水潰雷擊三軍亂矣必安其危去其患以智決之髙之以廊廟之論重之以受命之論銳之以踰垠之論則敵國可不戰而服重刑令第十三將自千人以上有戰而北守而降離地逃衆命曰國賊身戮家殘去其籍發其墳墓暴其骨于市男女公于官自百人以上有戰而北守而降離地逃衆命曰軍賊身死家殘男女公于官使民内畏重刑則外輕敵故先王明制度於前重威刑於後刑重則内畏内畏則外堅矣伍制令第十四軍中之制五人為伍伍相保也十人為什什相保也五十人為屬屬相保也百人為閭閭相保也伍有干令犯禁者揭之免於罪知而弗揭全伍有誅什有干令犯禁者揭之免於罪知而弗揭全什有誅屬有干令犯禁者揭之免於罪知而弗揭全屬有誅閭有干令犯禁者揭之免於罪知而弗揭全閭有誅吏自什長以上至左右將上下皆相保也有干令犯禁者揭之免於罪知而弗揭者皆與同罪夫什伍相結上下相聮無有不得之奸無有不揭之罪父不得以私其子兄不得以私其弟而况國人聚舍同食烏能以干令相私者哉分塞令第十五中軍左右前後軍皆有分地方之以行垣而無通其交往將有分地帥有分地伯有分地皆營其溝洫而明其塞令使非百人無得通非其百人而入者伯誅之伯不誅與之同罪軍中縱横之道百有二十步而立一府柱量人與地柱道相望禁行淸道非將吏之符節不得通行采薪芻牧者皆成行伍不成行伍者不得通行吏屬無節士無伍者横門誅之踰分于地者誅之故内無干令犯禁則外無不獲之奸尉繚子卷三
