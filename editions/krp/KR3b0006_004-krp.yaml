body:
  text: 尉繚子卷四周尉繚撰束伍令第十六束伍之令曰五人為伍共一符收於將吏之所亡伍而得伍者當之得伍而不亡有賞亡伍不得伍身死家殘亡長得長當之得長不亡有賞亡長不得長身死家殘復戰得首長除之亡將得將當之得將不亡有賞亡將不得將坐離地遁逃之法戰誅之法曰什長得誅十人伯長得誅十長千人之將得誅百人之長萬人之將得誅千人之將左右將軍得誅萬人之將大將軍無不得誅經卒令第十七經卒者以經令分之為三分焉左軍蒼旗卒戴蒼羽右軍白旗卒戴白羽中軍黄旗卒戴黄羽卒有五章前一行蒼章次二行赤章次三行黄章次四行白章次五行黑章次以經卒亡章者有誅前一五行置章于首次二五行置章于項次三五行置章于胷次四五行置章于腹次五五行置章于腰如此卒無非其吏吏無非其卒見非而不詰見亂而不禁其罪如之鼓行交鬭則前行進為犯難後行退為辱衆踰五行而前者有賞踰五行而後者有誅所以知進退先後吏卒之功也故曰鼓之前如雷霆動如風雨莫敢當其前莫敢躡其後言有經也勒卒令第十八金鼓鈴旗四者各有法鼓之則進重鼓則擊金之則止重金則退鈴傳令也旗麾之左則左麾之右則右奇兵則反是一鼓一擊而左一鼓一擊而右一步一鼓步鼓也十步一鼓趨鼓也音不絶騖鼓也商將鼓也角帥鼓也小鼓伯鼓也三鼓同則將帥伯其心一也奇兵則反是鼓失次者有誅諠譁者有誅不聽金鼓鈴旗而動者有誅百人而敎戰敎成合之千人千人敎成合之萬人萬人敎成會之于三軍三軍之衆有分有合為大戰之法敎成試之以閱方亦勝圎亦勝錯斜亦勝臨險亦勝敵在山緣而從之敵在淵没而從之求敵如求亡子從之無疑故能敗敵而制其命夫蚤決先定若計不先定慮不蚤決則進退不定疑生必敗故正兵貴先奇兵貴後或先或後制敵者也世將不知法者專命而行先擊而勇無不敗者也其舉有疑而不疑其往有信而不信其致有遲疾而不遲疾是三者戰之累也將令第十九將軍受命君必先謀於廟行令于廷君身以斧鉞授將曰左右中軍皆有分職若踰分而上請者死軍無二令二令者誅留令者誅失令者誅將軍告曰出國門之外期日中設營表置轅門期之如過時則坐法將軍入營則閉門清道有敢行者誅有敢髙言者誅有敢不從令者誅踵軍令第二十所謂踵軍者去大軍百里期于會地為三日熟食前軍而行為戰合之表合表乃起踵軍饗士使為之戰勢是謂趨戰者也興軍者前踵軍而行合表乃起去大軍一倍其道去踵軍百里期于會地為六日熟食使為戰備分卒據要害戰利則追北按兵而趨之踵軍遇有還者誅之所謂諸將之兵在四奇之内者勝也兵有什伍有分有合豫為之職守要塞闗梁而分居之戰合表起即皆㑹也大軍為計日之食起戰具無不及也令行而起不如令者誅凡稱分塞者四境之内當興軍踵軍既行則四境之民無得行者奉王之命授持符節名為順職之吏非順職之吏而行者誅之戰合表起順職之吏乃行用以相參故欲戰先安内也尉繚子卷四
