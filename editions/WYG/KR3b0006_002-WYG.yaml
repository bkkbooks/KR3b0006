body:
  text: 尉繚子卷二周尉繚撰守權第六凡守者進不郭圉退不亭障以禦戰非善者也豪傑英俊堅甲利兵勁弩強矢盡在郭中乃收窖廩毁折而入保令客氣十百倍而主之氣不半焉敵攻者傷之甚也然而世將弗能知夫守者不失其險者也守法城一丈十人守之工食不與焉出者不守守者不出一而當十十而當百百而當千千而當萬故為城郭者非特費於民聚土壤也誠為守也千丈之城則萬人之守也池深而廣城堅而厚士民備薪食給弩堅矢強矛㦸稱之此守法也攻者不下十餘萬之衆其有必救之軍者則有必守之城無必救之軍者則無必守之城若彼城堅而救誠則愚夫蠢婦無不蔽城盡資血城者期年之城守餘於攻者救餘於守者若彼城堅而救不誠則愚夫蠢婦無不守陴而泣下此人之常情也遂發其窖廩救撫則亦不能止矣必鼓其豪傑英俊堅甲利兵勁弩強矢并於前么麽毁瘠者并於後十萬之衆頓於城下救必開之守必出之出據要塞但救其後無絶其糧道中外相應此救而示之不誠示之不誠則倒敵而待之者也後其壯前其老彼敵無前守不得而止矣此守權之謂也十二陵第七威在於不變惠在於因時機在於應事戰在於治氣攻在於意表守在於外飾無過在於度數無困在於豫備慎在於畏小智在於治大除害在於敢㫁得衆在於下人悔在於任疑孽在於屠戮偏在於多私不祥在於惡聞己過不度在於竭民財不明在於受間不實在於輕發固陋在於離賢禍在於好利害在於親小人亡在於無所守危在於無號令武議第八凡兵不攻無過之城不殺無罪之人夫殺人之父兄利人之財貨臣妾人之子女此皆盜也故兵者所以誅暴亂禁不義也兵之所加者農不離其田業賈不離其肆宅士大夫不離其官府由其武議在於一人故兵不血刃而天下親焉萬乘農戰千乘救守百乘事養農戰不外索權救守不外索助事養不外索資夫出不足戰入不足守者治之以市市者所以給戰守也萬乘無千乘之助必有百乘之市凡誅者所以明武也殺一人而三軍震者殺之殺一人而萬人喜者殺之殺之貴大賞之貴小當殺而雖貴重必殺之是刑上究也賞及牛童馬圉者是賞下流也夫能刑上究賞下流此將之武也故人主重將夫將提鼓揮枹臨難決戰接兵角刃鼓之而當則賞功立名鼓之而不當則身死國亡是興亡安危應在枹端奈何無重將也夫提鼓揮枹接兵角刃君以武事成功者臣以為非難也古人曰無蒙衝而攻無渠答而守是謂無善之軍視無見聽無聞由國無市也夫市也者百貨之官也市賤賣貴以限士人人食粟一斗馬食菽三斗人有饑色馬有瘠形何也市有所出而官無主也夫提天下之節制而無百貨之官無謂其能戰也起兵直使甲胄生蟣蝨者必為吾所効用也鷙鳥逐雀有襲人之懷入人之室者非出生也後有憚也太公望年七十屠牛朝歌賣食盟津過七十餘而主不聽人人謂之狂夫也及遇文王則提三萬之衆一戰而天下定非武議安能此合也故曰良馬有策逺道可致賢士有合大道可明武王伐紂師渡盟津右旄左鉞死士三百戰士三萬紂之臣億萬飛亷惡來身先㦸斧陳開百里武王不罷士民兵不血刃而克商誅紂無祥異也人事修不修而然也今世將考孤虚占咸池合龜兆視吉凶觀星辰風雲之變欲以成勝立功臣以為難夫將者上不制于天下不制于地中不制于人故兵者凶器也爭者逆德也將者死官也故不得已而用之無天于上無地于下無主于後無敵于前一人之兵如狼如虎如風如雨如雷如電震震㝠㝠天下皆驚勝兵似水夫水至柔弱者也然所觸丘陵必為之崩無異也性專而觸誠也今以莫邪之利犀兕之堅三軍之衆有所奇正則天下莫當其戰矣故曰舉賢用能不時日而事利明法審令不卜筮而獲吉貴功養勞不禱祠而得福又曰天時不如地利地利不如人和古之聖人謹人事而已吳起與秦戰舍不平隴畝樸􅈪葢之以蔽霜露如此何也不自髙人故也乞人之死不索尊竭人之力不責禮故古者介冑之士不拜示人無已以煩也夫煩人而欲乞其死竭其力自古至今未嘗聞矣將受命之日㤀其家張軍宿野㤀其親援枹而鼓􅁯其身吳起臨戰左右進劒起曰將專主旗鼔爾臨難決疑揮兵指刃此將事也一劒之任非將事也三軍成行一舍而後成三舍三舍之餘如決川源望敵在前因其所長而用之敵白者堊之赤者赭之吳起與秦戰未合一夫不勝其勇前獲雙首而還吳起立斬之軍吏諫曰此材士也起曰材士則是也非吾令也斬之將理第九凡將理官也萬物之主也不私於一人夫能無私於一人故萬物至而制之萬物至而命之君子不救囚於五步之外雖鉤矢射之弗追也故善審囚之情不待箠楚而囚之情可畢矣笞人之背灼人之脇束人之指而訊囚之情雖國士有不勝其酷而自誣矣今世諺云千金不死百金不刑試聽臣之言行臣之術雖有堯舜之智不能闗一言雖有萬金不能用一銖今夫決獄小圄不下十數中圄不下百數大圄不下千數十人聮百人之事百人聮千人之事千人聮萬人之事所聮之者親戚兄弟也其次婚姻也其次知識故人也是農無不離田業賈無不離肆宅士大夫無不離官府如此闗聮良民皆囚之情也兵法曰十萬之師出日費千金今良民十萬而聮於囹圄上不能省臣以為危也原官第十官者事之所主為治之本也制者職分四民治之分也貴爵富祿必稱尊卑之體也好善罰惡正比法會計民之具也均井地節賦斂取與之度也程工人備器用匠工之功也分地塞要殄怪禁淫之事也守法稽㫁臣下之節也明法稽驗主上之操也明主守等輕重臣主之權也明賞賚嚴誅責止奸之術也審開塞守一道為政之要也下達上通至聰之聽也知國有無之數用其仂也知彼弱者強之體也知彼動者靜之決也官分文武惟王之二術也俎豆同制天子之會也遊說間諜無自入正議之術也諸侯有謹天子之禮君民繼世承王之命也更好易常違王明德故禮得以伐也官無事治上無慶賞民無獄訟國無商賈何王之至也明舉上達在王垂聽也尉繚子卷二
