body:
  text: 尉繚子兵家類提要臣等謹案尉繚子五卷周尉繚撰其人當六國時不知其本末或曰魏人以天官篇有梁惠王問知之或又曰齊人鬼谷子之弟子劉向别錄又云繚為南君學未詳孰是也漢志雜家有尉繚三十九篇隋志作五卷唐志作六卷亦並入於雜家鄭樵譏其見名而不見書馬端臨亦以為然然漢志兵形勢家内實别有尉繚三十一篇故胡應麟謂兵家之尉繚即今所傳而雜家之尉繚並非此書今雜家亡而兵家獨傳鄭以為孟堅之誤者非也特今書止二十四篇與所謂三十一篇者數不相合則後來已有所亡佚耳其書大㫖主於分本末别賓主明賞罰所言往往有合於正如云兵不攻無過之城不殺無罪之人又云兵者所以誅暴亂禁不義也兵之所加者農不離其田業賈不離其肆宅士大夫不離其官府故兵不血刃而天下親皆戰國談兵者所不道而兵令一篇於誅逃之法尢詳亦可想見其節制周氏涉筆謂雖未純王政亦庶幾能窺見本統者自孫武吳起而下未有能通之者也其書坊行本無卷數今依隋志之目分為五卷畧存其舊焉乾隆四十五年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:fa99ca394533542c2f9863525a96a59347502142a03a5d25bd251b8d4fbacb30
