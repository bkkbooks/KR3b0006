body:
  text: 伍制令軍中之制五人為伍伍相保也十人為什什相保也五十人為屬屬相保也百人為閭閭相保也伍有干令犯禁者揭之免於罪知而弗揭全伍有誅什有干令犯禁者揭之免於罪知而弗揭全什有誅屬有干令犯禁者揭之免於罪知而弗揭全屬有誅閭有干令犯禁者揭之免於罪知而弗揭全閭有誅吏自什長已上至左右將上下皆相保也有干令犯禁者揭之免於罪知而弗揭者皆與同罪夫什伍相結上下相聯無有不得之姦無有不揭之罪父不得以私其子兄不得以私其弟而況國人聚舍同食烏能以干令相私者哉
