body:
  text: 分塞令中軍左右前後軍皆有地分方之以行垣而無通其交往將有分地帥有分地伯有分地皆營其溝域而明其塞令使非百人無得通非其百人而入者伯誅之伯不誅與之同罪軍中縱橫之道百有二十步而立一府柱量人與地柱道相望禁行清道非將吏之符節不得通行采薪之牧者皆成行伍不成行伍者不得通行吏屬無節士無伍者橫門誅之踰分干地者誅之故內無干令犯禁則外無不獲之姦
