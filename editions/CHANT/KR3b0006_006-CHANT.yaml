body:
  text: 守權凡守者進不郭圉退不亭障以禦戰非善者也豪傑雄俊堅甲利兵勁弩彊矢盡在郭中乃收窖廩毀折而入保令客氣十百倍而主之氣不半焉敵攻者傷之甚也然而世將弗能知夫守者不失其險者也守法城一丈十人守之工食不與焉出者不守守者不出一而當十十而當百百而當千千而當萬故為城郭者非妄費於民聚土壤也誠為守也千丈之城則萬人之守池深而廣城堅而厚士民備薪食給弩堅矢彊矛戟稱之此守法也攻者不下十餘萬之眾其有必救之軍者則有必守之城無必救之軍者則無必守之城若彼城堅而救誠則愚夫惷婦無不蔽城盡資血城者朞年之城守餘於攻者救餘於守者若彼城堅而救不誠則愚夫惷婦無不守陴而泣下此人之常情也遂發其窖廩救撫則亦不能止矣必鼓其豪傑雄俊堅甲利兵勁弩彊矢并於前么麼毀瘠者并於後十萬之軍頓於城下救必開之守必出之出據要塞但救其後無絕其糧道中外相應此救而示之不誠示之不誠則倒敵而待之者也後其壯前其老彼敵無前守不得而止矣此守權之謂也
