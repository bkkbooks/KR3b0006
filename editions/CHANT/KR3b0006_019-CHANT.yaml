body:
  text: 將令將軍受命君必先謀於廟行令於廷君身以斧鉞授將曰左右中軍皆有分職若踰分而上請者死軍無二令二令者誅留令者誅失令者誅將軍告曰出國門之外期日中設營表置轅門期之如過時則坐法將軍入營即閉門清道有敢行者誅有敢高言者誅有敢不從令者誅
