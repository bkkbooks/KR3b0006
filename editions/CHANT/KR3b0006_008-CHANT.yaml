body:
  text: 武議凡兵不攻無過之城不殺無罪之人夫殺人之父兄利人之貨財臣妾人之子女此皆盜也故兵者所以誅暴亂禁不義也兵之所加者農不離其田業賈不離其肆宅士大夫不離其官府由其武議在於一人故兵不血刃而天下親焉萬乘農戰千乘救守百乘事養農戰不外索權救守不外索助事養不外索資夫出不足戰入不足守者治之以市市者所以給戰守也萬乘無千乘之助必有百乘之市凡誅者所以明武也殺一人而三軍震者殺之賞一人而萬人喜者賞之殺之貴大賞之貴小當殺而雖貴重必殺之是刑上究也賞及牛童馬圉者是賞下流也夫能刑上究賞下流此將之武也故人主重將夫將提鼓揮枹臨難決戰接兵角刃鼓之而當則賞功立名鼓之而不當則身死國亡是存亡安危在於枹端奈何無重將也夫提鼓揮枹接兵角刃君以武事成功者臣以為非難也古人曰無蒙衝而攻無渠答而守是為無善之軍視無見聽無聞由國無市也夫市也者百貨之官也市賤賣貴以限士人人食粟一斗馬食粟三斗人有飢色馬有瘠形何也市有所出而官無主也夫提天下之節制而無百貨之官無謂其能戰也起兵直使甲冑生蟣蝨者必為吾所效用也鷙鳥逐雀有襲人之懷入人之室者非出生也後有憚也太公望年七十屠牛朝歌賣食盟津過七年餘而主不聽人人謂之狂夫也及遇文王則提三萬之眾一戰而天下定非武議安得此合也故曰良馬有策遠道可致賢士有合大道可明武王伐紂師渡盟津右旄左鉞死士三百戰士三萬紂之陳億萬飛廉惡來身先戟斧陳開百里武王不罷士民兵不血刃而克商誅紂無祥異也人事脩不脩而然也今世將考孤虛占咸池合龜兆視吉凶觀星辰風雲之變欲以成勝立功臣以為難夫將者上不制於天下不制於地中不制於人故兵者凶器也爭者逆德也將者死官也故不得已而用之無天於上無地於下無主於後無敵於前一人之兵如狼如虎如風如雨如雷如霆震震冥冥天下皆驚勝兵似水夫水至柔弱者也然所觸丘陵必為之崩無異也性專而觸誠也今以莫邪之利犀兕之堅三軍之眾有所奇正則天下莫當其戰矣故曰舉賢用能不時日而事利明法審令不卜筮而獲吉貴功養勞不禱祠而得福又曰天時不如地利地利不如人和古之聖人謹人事而已吳起與秦戰舍不平隴畝樸樕蓋之以蔽霜露如此何也不自高人故也乞人之死不索尊竭人之力不責禮故古者甲冑之士不拜示人無己煩也夫煩人而欲乞其死竭其力自古至今未嘗聞矣將受命之日忘其家張軍宿野忘其親援枹而鼓忘其身吳起臨戰左右進劍起曰將專主旗鼓爾臨難決疑揮兵指刃此將事也一劍之任非將事也三軍成行一舍而後成三舍三舍之餘如決川源望敵在前因其所長而用之敵白者堊之赤者赭之吳起與秦戰未合一夫不勝其勇前獲雙首而還吳起立斬之軍吏諫曰此材士也不可斬起曰材士則是矣非吾令也斬之
