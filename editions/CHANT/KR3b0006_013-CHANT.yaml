body:
  text: 重刑令將自千人以上有戰而北守而降離地逃眾命曰國賊身戮家殘去其籍發其墳墓暴其骨於市男女公於官自百人已上有戰而北守而降離地逃眾命曰軍賊身死家殘男女公於官使民內畏重刑則外輕敵故先王明制度於前重威刑於後刑重則內畏內畏則外堅矣
