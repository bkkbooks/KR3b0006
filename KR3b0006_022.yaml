body:
  text: 兵教下臣聞人君有必勝之道故能并兼廣大以一其制度則威加天下有十二焉一曰連刑謂同罪保伍也二曰地禁謂禁止行道以網外姦也三曰全車謂甲首相附三五相同以結其聯也四曰開塞謂分地以限各死其職而堅守也五曰分限謂左右相禁前後相待垣車為固以逆以止也六曰號別謂前列務進以別其後者不得爭先登不次也七曰五章謂彰明行列始卒不亂也八曰全曲謂曲折相從皆有分部也九曰金鼓謂興有功致有德也十曰陳車謂接連前矛馬冒其目也十一曰死士謂眾軍之中有材力者乘於戰車前後縱橫出奇制敵也十二曰力卒謂經旗全曲不麾不動也此十二者教成犯令不舍兵弱能強之主卑能尊之令弊能起之民流能親之人眾能治之地大能守之國車不出於閫組甲不出於櫜而威服天下矣兵有五致為將忘家踰垠忘親指敵忘身必死則生急勝為下百人被刃陷行亂陳千人被刃擒敵殺將萬人被刃橫行天下武王問太公望曰吾欲少閒而極用人之要望對曰賞如山罰如谿太上無過其次補過使人無得私語諸罰而請不罰者死諸賞而請不賞者死伐國必因其變示之財以觀其窮示之弊以觀其病上乖者下離若此之類是伐之因也凡興師必審內外之權以計其去兵有備闕糧食有餘不足校所出入之路然後興師伐亂必能入之地大而城小者必先收其地城大而地窄者必先攻其城地廣而人寡者則絕其阨地狹而人眾者則築大堙以臨之無喪其利無奪其時寬其政夷其業救其弊則足以施天下今戰國相攻大伐有德自伍而兩自兩而師不一其令率俾民心不定徒尚驕侈謀患辯訟吏究其事累且敗也日暮路遠還有挫氣師老將貪爭掠易敗凡將輕壘卑眾動可攻也將重壘高眾懼可圍也凡圍必開其小利使漸夷弱則節吝有不食者矣眾夜擊者驚也眾避事者離也待人之救期戰而蹙皆心失而傷氣也傷氣敗軍曲謀敗國
