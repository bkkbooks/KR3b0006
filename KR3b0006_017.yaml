body:
  text: 經卒令經卒者以經令分之為三分焉左軍蒼旗卒戴蒼羽右軍白旗卒戴白羽中軍黃旗卒戴黃羽卒有五章前一行蒼章次二行赤章次三行黃章次四行白章次五行黑章次以經卒亡章者有誅前一五行置章於首次二五行置章於項次三五行置章於胸次四五行置章於腹次五五行置章於腰如此卒無非其吏吏無非其卒見非而不詰見亂而不禁其罪如之鼓行交鬭則前行進為犯難後行退為辱衆踰五行而前者有賞踰五行而後者有誅所以知進退先後吏卒之功也故曰鼓之前如雷霆動如風雨莫敢當其前莫敢躡其後言有經也
