body:
  text: 戰權兵法曰千人而成權萬人而成武權先加人者敵不力交武先加人者敵無威接故兵貴先勝於此則勝彼矣弗勝於此則弗勝彼矣凡我往則彼來彼來則我往相為勝敗此戰之理然也夫精誠在乎神明戰權在乎道之所極有者無之無者有之安所信之先王之所傳聞者任正去詐存其慈順決無留刑故知道者必先啚不知止之敗惡在乎必往有功輕進而求戰敵復啚止我往而敵制勝矣故兵法曰求而從之見而加之主人不敢當而陵之必喪其權凡奪者無氣恐者不可守敗者無人兵無道也意往而不疑則從之奪敵而無敗則加之明視而高居則威之兵道極矣其言無謹偷矣其陵犯無節被矣水潰雷擊三軍亂矣必安其危去其患以智決之高之以廊廟之論重之以受命之論鋭之以踰垠之論則敵國可不戰而服
