body:
  text: 兵令上兵者凶器也爭者逆德也事必有本故王者伐暴亂本仁義焉戰國則以立威抗敵相圖而不能廢兵也兵者以武為植以文為種以武為表以文為裏以武為外以文為內能審此三者則知所以勝敗矣文所以視利害辨安危武所以犯強敵力攻守也兵用文武也如響之應聲也如影之隨身也專一則勝離散則敗陳以密則固鋒以䟽則達將有威則生無威則死有威則勝無威則敗卒有將則鬭無將則北有將則死無將則辱威者賞罰之謂也卒畏將甚於敵者勝卒畏敵甚於將者敗所以知勝敗者固稱將於敵也敵與將猶權衡焉安靜則治暴疾則亂出卒陳兵有常令行伍䟽數有常法先後之次有適宜常令者非追北襲邑攸用也前後不次則失也亂先後斬之常陳皆向敵有內向有外向有立陳有坐陳夫內向所以顧中也外向所以備外也立陳所以行也坐陳所以止也立坐之陳相參進止將在其中坐之兵劍斧立之兵戟弩將亦居中善御敵者正兵先合而後扼之此必勝之術也陳之斧鉞飾之旗章有功必賞犯令必死存亡死生在枹之端雖天下有善兵者莫能禦此矣矢射未交長刃未接前譟者謂之虛後譟者謂之實不譟者謂之祕虛實者兵之體也
