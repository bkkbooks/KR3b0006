  - {type: variant, offset: 72, length: 190, content: 登者未嘗非多力國士也先死者亦未嘗非多力國士也損敵一人而損我百人此資敵而傷我甚焉世將不能禁征役分軍而逃歸或臨戰自北則逃傷甚焉世將不能禁殺人於百步之外者弓矢也殺人於五十步之內者矛戟也將已鼓而士卒相囂拗矢折矛抱戟利後發戰有此數者內自敗也世將不能禁士失什伍車失偏列奇兵捐將而走大眾亦走世將不能禁夫將能禁此四者則高山陵之深水絕之堅陳犯之不能禁此四者猶亡舟楫絕江河不可得也民非樂死而惡生也號令, WYG: 王}
