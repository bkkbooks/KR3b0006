  - {type: variant, offset: 618, length: 210, content: 民無伍莫能正矣經制十萬之眾而王必能使之衣吾衣食吾食戰不勝守不固者非吾民之罪內自致也天下諸國助我戰猶良驥騄耳之駛彼駑馬鬐興角逐何能紹吾氣哉吾用天下之用為用吾制天下之制為制修吾號令明吾刑賞使天下非農無所得食非戰無所得爵使民揚臂爭出農戰而天下無敵矣故曰發號出令信行國內民言有可以勝敵者毋許其空言必試其能戰也視人之地而有之分人之民而畜之必能內有其賢者也不能內有其賢而欲有天下必覆軍殺將如此雖戰勝而國益弱得地而國益貧由國中之制弊矣, WYG: 奸尉繚子卷三}
