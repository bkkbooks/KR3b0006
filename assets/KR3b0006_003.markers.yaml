  - {type: variant, offset: 9, length: 2, content: 先定, krp: 勝矣故兵法曰求而從之見而加之主人不敢當而陵之必喪其權凡奪者無氣恐者不可守敗者無人兵無道也意往而不疑}
  - {type: variant, offset: 12, length: 1, content: 士, WYG: 從之奪敵而無前則加之明視而髙居則威之兵道極矣其言無謹偷失其陵犯無節破矣水潰雷擊三軍亂矣必安其危去其患以智決之髙之以廊廟之論重之以受命之論銳之以踰垠之論則敵國可}
