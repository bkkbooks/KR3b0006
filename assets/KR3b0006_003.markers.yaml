  - {type: variant, offset: 522, length: 0, content: '', WYG: 免於罪知而弗揭全伍有誅什有干令犯禁者揭之免於罪知而弗揭全什有誅屬有干令犯禁者揭之免於罪知而弗揭全屬有誅閭有干令犯禁者揭之免於罪知而弗揭全閭有誅吏自什長以上至左右將上下皆相保也有干令犯禁者揭之免於罪知而弗揭者皆與同罪夫什伍相結上下相聮無有不得之奸無有不揭之罪父不得以私其子兄不得以私其弟而况國人聚舍同食烏能以干令相私者哉分塞令第十五中軍左右前後軍皆有分地方之以行垣而無通其交往將有分地帥有分地伯有分地皆營其溝洫而明其塞令使非百人無得通非其百人而入者伯誅之伯不誅與之同罪軍中縱横之道百有二十步而立一府柱量人與地柱道相望禁行淸道非將吏之符節不得通行采薪芻牧者皆成行伍不成行伍者不得通行吏屬無節士無伍者横門誅之踰分于地者誅之故内無干令犯禁}
