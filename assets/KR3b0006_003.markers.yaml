markers:
  front:
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書尉繚子卷三周尉繚撰治本第十一凡治人者何曰非五穀無以充腹非絲麻無以葢形故充腹有粒葢形有縷夫在芸耨妻在機杼民無二事則有儲蓄夫無雕文刻鏤之事女無繡飾纂組之作木器液金器腥聖人飲于土食于土故埏埴以為器天下無費今也金木之性不寒而衣繡飾馬牛之性食草飲水而給菽粟是治失其本而宜設之}
  - {type: page-break, offset: 0, content: '', id: KR3b0006_WYG_003-1a, image: WYG0726/WYG0726-0081a.png}
  - {type: page-break, offset: 0, content: '', id: KR3b0006_WYG_003-1b, image: WYG0726/WYG0726-0081b.png}
  - {type: variant, offset: 0, length: 0, content: '', krp: 欽定四庫全書尉繚子卷三周尉繚撰治本第十一凡治人者何曰非五穀無以充腹非絲麻無以葢形故充腹有粒葢形有縷夫在芸耨妻在機杼民無二事則有儲蓄夫無雕文刻鏤之事女無繡飾纂組之作木器液金器腥聖人飲于土食于土故埏埴以為器天下無費今也金木之性不寒而衣繡飾馬牛之性食草飲水而給菽粟是治失其本而宜設之}
  body:
  - {type: punctuation, offset: 0, content: 《, id: KR3b0006_CHANT_003-bkkpn1}
  - {type: variant, offset: 1, length: 1, content: 談, WYG: 也春夏夫出于南畝秋冬女練于布帛則民不困今裋褐不蔽形糟糠不充腹失其治也古者土無肥磽人無勤惰古人何得而今人何失耶耕有不終畝織有日㫁機而奈何饑寒葢古治之行今治之止也夫所謂治者使民無私也民無私則天下為一家而無私耕私織共寒其寒共饑其饑故如有子十人不加一飯有子一人不損一飯焉有喧呼耽酒以敗善類乎民有輕佻則欲心興爭奪之患起矣横生于一夫則民私飯有儲食私用有儲財民一犯禁而拘以刑治烏在其為人上也善政執其制使民無私為下不敢私則無為非者矣反本緣理出乎一道則欲心去爭奪止囹圄空野充粟多安民懷逺外無天下之難内無暴亂之事治之至也蒼蒼之天莫知其極帝王之君誰能法則往世不可及來世不可待求己者也所謂天子者四焉一曰神明二曰垂光三曰洪敘四曰無敵此天子之事也野物不為犧牲雜學不為通儒今說者曰百里之海不能飲一夫三尺之泉足止三軍渴臣謂欲生于無度邪生於無禁大上神化其次因物其下在于無奪民時無損民財夫禁必以武而成賞必以文而成戰權第十二兵法曰千人而成權萬人而成武權先加人者敵不力交武先加人者敵無威接故兵貴先勝於此則勝彼矣弗勝於此則弗勝彼矣}
  - {type: page-break, offset: 1, content: '', id: KR3b0006_WYG_003-2a, image: WYG0726/WYG0726-0081c.png}
  - {type: page-break, offset: 1, content: '', id: KR3b0006_WYG_003-2b, image: WYG0726/WYG0726-0081d.png}
