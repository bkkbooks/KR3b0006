  - {type: variant, offset: 302, length: 0, content: '', WYG: 兵談第二量土地肥磽而立邑建城稱地以城稱人以人稱粟三相稱則内可以固守外可以戰勝戰勝於外備主於内勝備相應猶合符節無異故也治兵者若秘于地若邃于天生于無故開之大不窕小不恢明乎禁舍開塞民流者親之地不任者任之夫土廣而任則國富民衆而制則國治富治者民不發軔甲不出暴而威制天下故曰兵勝于朝廷不暴甲而勝者主勝也陳而勝者將勝也兵起非可以忿也見勝則興不見勝則止患在百里之内不起一日之師患在千里之内不起一月之師患在四海之内不起一歲之師將者上不制于天下不制于地中不制于人寛不可激而怒清不可事以財夫心狂耳聾目盲以三悖率人者難矣兵之所及羊腸亦勝鋸齒亦勝緣山亦勝入谷亦勝方亦勝圎亦勝重者如山如林如江如河輕者如炮如燔如垣壓之如雲覆之令人聚不得以散散不得以聚左不得以右右不得以左兵如總木弩如羊角人人無不騰陵張膽絶乎疑慮堂堂決而去制談第三凡兵制必先定制先定則士不亂士不亂則刑乃明金鼓所指則百人盡鬭陷行亂陳則千人盡鬭覆軍殺將則萬人齊刃天下莫能當其戰矣古者士有什伍車有偏列鼓鳴旗麾先登者未嘗非多力國士也先死者亦未嘗非多力國士也損敵一人而損我百人此資敵而傷我甚焉世將不能禁征役分軍而逃歸或臨戰自北則逃傷甚焉世將不能禁殺人於百步之外者弓矢也殺人於五十步之内者矛㦸也將已鼓而士卒相囂拗矢折矛抱㦸利後發戰有此數者内自敗也世將不能禁士失什伍車失偏列奇兵捐將而走大衆亦走世將不能禁夫將能禁此四者則髙山陵之深水絶之堅陳犯之不能禁此四者猶亡舟楫絶江河不可得也民非樂死而惡生也號令明法制審故能使之前明賞於前決罰於後是以發能中利動則有功令百人一卒千人一司馬萬人一將以少誅衆以弱誅強試聽臣言其術足使三軍之衆誅一人無失刑父不敢舍子子不敢舍父况國人乎一夫仗劒擊于市萬人無不避之者臣謂非一人之獨勇萬人皆不肖也何則必死與必生固不侔也聽臣之術足使三軍之衆為一死賊莫敢當其前莫敢隨其後而能獨出獨入焉獨出獨入者王霸之兵也有提十萬之衆而天下莫當者誰曰桓公也有提七萬之衆而天下莫當者誰曰吳起也有提三萬之衆而天下莫當者誰曰武子也今天下諸國士所率無不及二十萬之衆然不能濟功名者不明乎禁舍開塞也明其制一人勝之則十人亦以勝之也十人勝之則百千萬人亦以勝之也故曰便吾器用養吾武勇發之如鳥擊如赴千仞之谿今國被患者以重幣出聘以愛子出質以地界出割得天下助卒名為十萬其實不過數萬爾其兵來者無不謂其將曰無為人下先戰其實不可得而戰也量吾境内之民無伍莫能正矣經制十萬之衆而王必能使之衣吾衣食吾食戰不勝守不固者非吾民之罪内自致也天下諸國助我戰猶良驥騄駬之駃彼駑馬鬐興角逐何能紹吾氣哉吾用天下之用為用吾制天下之制為制修吾號令明吾刑賞使天下非農無所得食非戰無所得爵使民揚臂爭出農戰而天下無敵矣故曰發號出令信行國内民言有可以勝敵者毋許其空言必試其能戰也視人之地而有之分人之民而畜之必能内有其賢者也不能内有其賢而欲有天下必覆軍殺將如此雖戰勝而國益弱得地而國益貧由國中之制弊矣戰威第四凡兵有以道勝有以威勝有以力勝講武料敵使敵之氣失而師散雖刑全而不為之用此道勝也審法制明賞罰便器用使民有必戰之心此威勝也破軍殺將乘闉發機潰衆奪地成功乃返此力勝也王侯知此所以三勝者畢矣夫將之所以戰者民也民之所以戰者氣也氣實則鬭氣奪則走刑未加兵未接而所以奪敵者五一曰廟勝之論二曰受命之論三曰踰垠之論四曰深溝髙壘之論五曰舉陳加刑之論此五者先料敵而後動是以擊虚奪之也善用兵者能奪人而不奪於人奪者心之機也令者一衆心也衆不審則數變數變則令雖出衆不信矣故令之之法小過無更小疑無中故上無疑令則衆不二聽動無疑事則衆不二志未有不信其心而能得其力者也未有不得其力而能致其死戰者也故國必有禮信親愛之義則可以饑易飽國必有孝慈亷恥之俗則可以死易生古者率民必先禮信而後爵祿先亷恥而後刑罰先親愛而後律其身故戰者心本乎率身以勵衆士如心之使四肢也志不勵則士不死節士不死節則衆不戰勵士之道民之生不可不厚也爵列之等死喪之親民之所營不可不顯也必也因民所生而制之因民所營而顯之田祿之實飲食之親鄉里相勸死喪相救兵役相從此民之所勵也使什伍如親戚卒伯如朋友止如堵牆動如風雨車不結轍士不旋踵此本戰之道也地所以養民也城所以守地也戰所以守城也故務耕者民不饑務守者地不危務戰者城不圍三者先王之本務本務者兵最急故先王專於兵有五焉委積不多則士不行賞祿不厚則民不勸武士不選則衆不強器用不備則力不壯刑罰不中則衆不畏務此五者靜能守其所固動能成其所欲夫以居攻出則居欲重陳欲堅發欲畢鬭欲齊王國富民霸國富士僅存之國富大夫亡國富倉府所謂上滿下漏患無所救故曰舉賢任能不時日而事利明法審令不卜筮而獲吉貴功養勞不禱祠而得福故曰天時不如地利地利不如人和聖人所貴人事而已夫勤勞之師將必先已暑不張葢寒不重衣險必下步軍井成而後飲軍食熟而後飯軍壘成而後舍勞佚必以身同之如此師雖久而不老不弊攻權第五兵以靜勝國以專勝力分者弱心疑者背夫力弱故進退不豪縱敵不擒將吏士卒動靜一身心既疑背則計決而不動動決而不禁異口虚言將無修容卒無常試發攻必衂是謂疾陵之兵無足與鬭將帥者心也羣下者支節也其心動以誠則支節必力其心動以疑則支節必背夫將不心制卒不節動雖勝幸勝也非攻權也夫民無兩畏也畏我侮敵畏敵侮我見侮者敗立威者勝凡將能其道者吏畏其將也吏畏其將者民畏其吏也民畏其吏者敵畏其民也是故知勝敗之道者必先知畏侮之權夫不愛說其心者不我用也不威嚴其心者不我舉也愛在下順威在上立愛故不二威故不犯故善將者愛與威而已戰不必勝不可以言戰攻不必拔不可以言攻不然刑賞不足信也信在期前事在未兆故衆已聚不虚散兵已出不徒歸求敵若求亡子擊敵若救溺人分險者無戰心挑戰者無全氣鬭戰者無勝兵凡挾義而戰者貴從我起爭私結怨應不得已怨結雖起待之貴後故爭必當待之息必當備之兵有勝于朝廷有勝于原野有勝于市井鬭則得服則失幸以不敗此不意彼驚懼而曲勝之也曲勝言非全也非全勝者無權名故明主戰攻之日合鼓合角節以兵刃不求勝而勝也兵有去備徹威而勝者以其有法故也有器用之蚤定也其應敵也周其總率也極故五人而伍十人而什百人而卒千人而率萬人而將已周已極其朝死則朝代暮死則暮代權敵審將而後舉兵故凡集兵千里者旬日百里者一日必集敵境卒聚將至深入其地錯絶其道棲其大城大邑使之登城逼危男女數重各逼地形而攻要塞據一城邑而數道絶從而攻之敵將帥不能信吏卒不能和刑有所不從者則我敗之矣敵救未至而一城已降津梁未發要塞未修城險未設渠答未張則雖有城無守矣逺堡未入戍客未歸則雖有人無人矣六畜未聚五穀未收財用無斂則雖有資無資矣夫城邑空虚而資盡者我因其虚而攻之法曰獨出獨入敵人不接刃而致之此之謂也尉繚子卷一}
