  - {type: variant, offset: 87, length: 96, content: 支節也其心動以誠則支節必力其心動以疑則支節必背夫將不心制卒不節動雖勝幸勝也非攻權也夫民無兩畏也畏我侮敵畏敵侮我見侮者敗立威者勝凡將能其道者吏畏其將也吏畏其將者民畏其吏也民畏其吏者敵畏其民也是故, WYG: ''}
