  - {type: variant, offset: 20, length: 0, content: '', WYG: 卒謂經其全曲不麾不動也此十二者敎成犯令不舍兵}
  - {type: page-break, offset: 20, content: '', id: KR3b0006_WYG_005-3b, image: WYG0726/WYG0726-0086d.png}
  - {type: variant, offset: 20, length: 0, content: '', krp: 卒謂經其全曲不麾不動也此十二者敎成犯令不舍兵}
  - {type: variant, offset: 21, length: 0, content: '', WYG: 能強之主卑能尊之令弊能起之民流能親之人衆能治之地大能守之國車不出于閫組甲不出于橐而威服天下矣兵有五致為將忘家踰垠忘親指敵忘身必死則生急勝為下百人被刃陷行亂陳千人被刃擒敵殺將萬人被刃横行天下武王問太公望曰吾欲少間而極用人之要望對曰賞如山罰如谿太上無過其次補過使人無得私語諸罰而請不罰者死諸賞而請不賞者死伐國必因其變示之財以觀其窮示之弊以觀其病上乖下離若此之類是伐之因也凡興師必審内外之權以計其去兵有備闕糧食有餘不足校所出入之路然後興師伐亂必能入之地大而城小者必先收其地城大而地窄者必先攻其城地廣而人寡者則絶其阨地窄而人衆者則築大堙以臨之無喪其利無奪其時寛其政夷其業救其弊則足以施天下今戰國相攻大伐有德自伍而兩自兩而師不一其令率俾民心不定徒尚驕侈謀患辨訟吏究其事累且敗也日暮路逺還有剉氣師老將貪爭掠易敗凡將輕壘卑衆動可攻也將重壘髙衆懼可圍也凡圍必開其小利使漸夷弱則節吝有不食者矣衆夜擊者驚也衆避事者離也待人之救期戰而蹙皆心失而氣傷也傷氣敗軍曲謀敗國兵令上第二十三兵者凶器也爭者逆德也事必有本}
  - {type: page-break, offset: 21, content: '', id: KR3b0006_WYG_005-4a, image: WYG0726/WYG0726-0087a.png}
  - {type: page-break, offset: 21, content: '', id: KR3b0006_WYG_005-4b, image: WYG0726/WYG0726-0087b.png}
