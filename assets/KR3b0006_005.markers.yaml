  - {type: variant, offset: 3, length: 0, content: '', WYG: 敎上第二十一兵之敎令分營居陳有非令而進退者如犯敎之罪前行者前行敎之後行者後行敎之左行者左行敎之右行者右行敎之敎舉五人其甲首有賞弗敎如犯敎之罪羅地者自揭其伍伍内互掲之免其罪凡伍臨陳若一人有不盡死於敵則敎者如犯法者之罪凡什保什若亡一人而九人不盡死於敵則敎者如犯法者之罪自什}
