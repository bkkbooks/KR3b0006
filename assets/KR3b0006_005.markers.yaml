  - {type: variant, offset: 4, length: 1, content: 靜, WYG: 上至於裨將有不若法者則敎者如犯法者之罪凡明刑罰正勸賞必在乎兵敎之法將異其旗卒異其章左軍章左肩右軍章右肩中軍章胸前書其章曰某甲某士前後章各五行尊章置首上其次差降之伍長敎其四人以板為鼓以瓦為金以竿為旗擊鼓而進低旗則趨擊金而退麾而左之麾而右之金鼓俱擊而坐伍長敎成合之什長什長敎成合之卒長卒長敎成合之伯長伯長敎成合之兵尉兵尉敎成合之裨將裨將敎成合之大將大將敎成陳於中野置大表三百步而一既陳去表百步而決百步而趨百步而騖習戰以成其節為之賞罰自尉吏而下盡有旗戰}
