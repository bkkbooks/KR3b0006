  - {type: variant, offset: 17, length: 2, content: 背夫, WYG: 有以也令守者必固戰者必鬭奸謀不作姦民不語令行無變兵行無猜輕者若霆奮敵若驚舉功别德明如白黑令民從上令如四肢應心也前軍絶行亂陳破堅如潰者有以也此之謂兵敎所以開封疆守社稷除患害成武德也兵敎下第二十二臣聞人君有必勝之道故能并兼廣大以一其制度則威加天下有十二焉一曰連刑謂同罪保伍也二曰地禁謂禁止行道以網外奸也三曰全軍謂甲首相附三五相同以結其聮也四曰開塞謂分地以限各死其職而堅守也五曰分限謂左右相禁前後相待垣車為固以逆以止也六曰號别謂前列務進以别其後者不得爭先登不次也七曰五章謂彰明行列始卒不亂也八曰全曲謂曲折相從皆有分部也九曰金鼔謂興有功致有德也十曰陳車謂接連前矛馬冒其目也十一曰死士謂衆軍之中有材智者乘於戰車前後縱横出奇制敵也十二曰}
