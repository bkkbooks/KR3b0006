  - {type: variant, offset: 227, length: 0, content: '', WYG: 于人故兵者凶器也爭者逆德也將者死官也故不得已而用之無天于上無地于下無主于後無敵于前一人之兵如狼如虎如風如雨如雷如電震震㝠㝠天下皆驚勝兵似水夫水至柔弱者也然所觸丘陵必為之崩無異也性專而觸誠也今以莫邪之利犀兕之堅三軍之衆有所奇正則天下莫當其戰矣故曰舉賢用能不時日而事利明法審令不卜筮而獲吉貴功養勞不禱祠而得福又曰天時不如地利地利不如人和古之聖人謹人事而已吳起與秦戰舍不平隴畝樸􅈪葢之以蔽霜露如此何也不自髙人故也乞人之死不索尊竭人之力不責禮故古者介冑之士不拜示人無已以煩也夫煩人而欲乞其死竭其力自古至今未嘗聞矣將受命之日㤀其家張軍宿野㤀其親援枹而鼓􅁯其身吳起臨戰左右進劒起曰將專主旗鼔爾臨難決疑揮兵指刃此將事也一劒之任非將事也三軍成行一舍而後成三舍三舍之餘如決川源望敵在前因其所長而用之敵白者堊之赤者赭之吳起與秦戰未合一夫不勝其勇前獲雙首而還吳起立斬之軍吏諫曰此材士也起曰材士則是也非吾令也斬之將理第九凡將理官也萬物之主也不私}
