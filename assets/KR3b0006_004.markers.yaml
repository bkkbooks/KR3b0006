  - {type: variant, offset: 528, length: 0, content: '', WYG: 法敎成試之以閱方亦勝圎亦勝錯斜亦勝臨險亦勝敵在山緣而從之敵在淵没而從之求敵如求亡子從之無疑故能敗敵而制其命夫蚤決先定若計不先定慮不蚤決則進退不定疑生必敗故正兵貴先奇兵貴後或先或後制敵者也世將不知法者專命而行先擊而勇無不敗者也其舉有疑而不疑其往有信而不信其致有遲疾而不遲疾是三者戰之累也將令第十九將軍受命君必先謀於廟行令于廷君身以斧鉞授將曰左右中軍皆有分職若踰分而上請者死軍無二令二令者誅留令者誅失令者誅將軍告曰出國門之外期日中設營表置轅門期之如過時則坐法將軍入營則閉門清}
