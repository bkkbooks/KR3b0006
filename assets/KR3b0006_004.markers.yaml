  - {type: variant, offset: 101, length: 221, content: 所以戰者氣也氣實則鬭氣奪則走刑如未加兵未接而所以奪敵者五一曰廟勝之論二曰受命之論三曰踰垠之論四曰深溝高壘之論五曰舉陳加刑之論此五者先料敵而後動是以擊虛奪之也善用兵者能奪人而不奪於人奪者心之機也令者所以一眾心也眾不審則數變數變則令雖出眾不信矣故令之法雖有小過無更小疑無申事所以待眾力也不審所動則數變數變則事雖起眾不安也動事之法雖有小過無更小難無戚故上無疑令則眾不二聽動無疑事則眾不二志古率民者未有不信其心而能得其力者也未有不得其力而能致其死戰者, WYG: 功}
