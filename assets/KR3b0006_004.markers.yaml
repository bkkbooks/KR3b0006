  - {type: variant, offset: 578, length: 258, content: 本務者兵最急故先王務專於兵專於兵其本有五焉委積不多則士不行賞祿不厚則民不勸武士不選則眾不強備用不便則力不壯刑賞不中則眾不畏先王務此五者故靜能守其所固動能成其所欲夫以居攻出則居欲重陣欲堅發欲畢鬭欲齊王國富民霸國富士僅存之國富大夫亡國富倉府所謂上滿下漏患無所救故曰舉賢任能不時日而事利明法審令不卜筮而事吉貴功養勞不禱祠而得福又曰天時不如地利地利不如人和聖人所貴人事而已夫勤勞之師將不先己暑不張蓋寒不重衣有登降之險將必下步軍井成而後飲軍食熟而後飯軍壘成而後舍軍不畢食亦不火食飢飽勞佚寒暑必以身同之如此則師雖久而不老雖老不弊, WYG: 尉繚子卷四}
