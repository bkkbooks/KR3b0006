body:
  text: 治本凡治人者何曰非五穀無以充腹非絲麻無以蓋形故充腹有粒蓋形有縷夫在藝耨妻在機杼民無二事則有儲蓄夫無雕文刻鏤之事女無繡飾纂組之作木器液金器腥聖人飲於土食於土故埏埴以為器天下無費今也金木之性不寒而衣繡飾馬牛之性食草飲水而給菽粟是治失其本而宜設之制也春夏夫出於南畝秋冬女練於布帛則民不困今短褐不蔽形糟粳不充腹失其治也古者土無肥磽人無勤惰古人何得而今人何失邪耕有不終畝織有日斷機而奈何寒飢蓋古治之行今治之止也夫謂治者使民無私也民無私則天下為一家而無私耕私織共寒其寒共飢其飢故如有子十人不加一飯有子一人不損一飯焉有喧呼鴆酒以敗善類乎民相輕佻則欲心與爭奪之患起矣橫生於一夫則民私飯有儲食私用有儲財民一犯禁而拘以刑治烏有以為人上也善政執其制使民無私為下不敢私則無為非者矣反本緣理出乎一道則欲心去爭奪止囹圄空野充粟多安民懷遠外無天下之難內無暴亂之事治之至也蒼蒼之天莫知其極帝王之君誰為法則往世不可及來世不可待求己者也所謂天子者四焉一曰神明二曰垂光三曰洪敘四曰無敵此天子之事也野物不為犧牲雜學不為通儒今説者曰百里之海不能飲一夫三尺之泉足以止三軍渴臣謂欲生於無度邪生於無禁太上神化其次因物其下在於無奪民時無損民財夫禁必以武而成賞必以文而成
