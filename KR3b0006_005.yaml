body:
  text: 攻權兵以靜勝國以專勝力分者弱心疑者背夫力弱故進退不豪縱敵不禽將吏士卒動靜一身心既疑背則計決而不動動決而不禁異口虛言將無修容卒無常試發攻必衄是謂疾陵之兵無足與鬭將帥者心也群下者支節也其心動以誠則支節必力其心動以疑則支節必背夫將不心制卒不節動雖勝幸勝也非攻權也夫民無兩畏也畏我侮敵畏敵侮我見侮者敗立威者勝凡將能其道者吏畏其將也吏畏其將者民畏其吏也民畏其吏者敵畏其民也是故知勝敗之道者必先知畏侮之權夫不愛説其心者不我用也不嚴畏其心者不我舉也愛在下順威在上立愛故不二威故不犯故善將者愛與威而已戰不必勝不可以言戰攻不必拔不可以言攻不然雖刑賞不足信也信在期前事在未兆故衆已聚不虛散兵已出不徒歸求敵若求亡子擊敵若救溺人分險者無戰心挑戰者無全氣鬭戰者無勝兵凡挾義而戰者貴從我起爭私結怨應不得已怨結雖起待之貴後故爭必當待之息必當備之兵有勝於朝廷有勝於原野有勝於市井鬭則得服則失幸以不敗此不意彼驚懼而曲勝之也曲勝言非全也非全勝者無權名故明主戰攻日合鼓合角節以兵刃不求勝而勝也兵有去備徹威而勝者以其有法故也有器用之早定也其應敵也周其總率也極故五人而伍十人而什百人而卒千人而率萬人而將已周已極其朝死則朝代暮死則暮代權敵審將而後舉兵故凡集兵千里者旬日百里者一日必集敵境卒聚將至深入其地錯絶其道栖其大城大邑使之登城逼危男女數重各逼地形而攻要塞據一城邑而數道絶從而攻之敵將帥不能信吏卒不能和刑有所不從者則我敗之矣敵救未至而一城已降津梁未發要塞未修城險未設渠答未張則雖有城無守矣遠堡未入戍客未歸則雖有人無人矣六畜未聚五穀未收財用未斂則雖有資無資矣夫城邑空虛而資盡者我因其虛而攻之法曰獨出獨入敵不接刃而致之此之謂也
