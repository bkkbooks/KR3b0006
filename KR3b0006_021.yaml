body:
  text: 兵教上兵之教令分營居陳有非令而進退者加犯教之罪前行者前行教之後行者後行教之左行者左行教之右行者右行教之教舉五人其甲首有賞弗教如犯教之罪羅地者自揭其伍伍內互揭之免其罪凡伍臨陳若一人有不進死於敵則教者如犯法者之罪凡什保什若亡一人而九人不盡死於敵則教者如犯法者之罪自什已上至於裨將有不若法者則教者如犯法者之罪凡明刑罰正勸賞必在乎兵教之法將異其旗卒異其章左軍章左肩右軍章右肩中軍章胸前書其章曰某甲某士前後章各五行尊章置首上其次差降之伍長教其四人以板為鼓以瓦為金以竿為旗擊鼓而進低旗則趨擊金而退麾而左之麾而右之金鼓俱擊而坐伍長教成合之什長什長教成合之卒長卒長教成合之伯長伯長教成合之兵尉兵尉教成合之裨將裨將教成合之太將大將教之陳於中野置大表三百步而一既陳去表百步而決百步而趨百步而騖習戰以成其節乃為之賞法自尉吏而下盡有旗戰勝得旗者各視其所得之爵以明賞勸之心戰勝在乎立威立威在乎戮力戮力在乎正罰正罰者所以明賞也令民背國門之限決死生之分教之死而不疑者有以也令守者必固戰者必鬭姦謀不作姦民不語令行無變兵行無猜輕者若霆奮敵若驚舉功別德明如白黑令民從上令如四支應心也前軍絕行亂陳破堅如潰者有以也此之謂兵教所以開封疆守社稷除患害成武德也
