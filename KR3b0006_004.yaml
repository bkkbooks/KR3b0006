body:
  text: 戰威凡兵有以道勝有以威勝有以力勝講武料敵使敵之氣失而師散雖形全而不為之用此道勝也審法制明賞罰便器用使民有必戰之心此威勝也破軍殺將乘闉發機潰眾奪地成功乃返此力勝也王侯知此以三勝者畢矣夫將卒所以戰者民也民之所以戰者氣也氣實則鬭氣奪則走刑如未加兵未接而所以奪敵者五一曰廟勝之論二曰受命之論三曰踰垠之論四曰深溝高壘之論五曰舉陳加刑之論此五者先料敵而後動是以擊虛奪之也善用兵者能奪人而不奪於人奪者心之機也令者所以一眾心也眾不審則數變數變則令雖出眾不信矣故令之法雖有小過無更小疑無申事所以待眾力也不審所動則數變數變則事雖起眾不安也動事之法雖有小過無更小難無戚故上無疑令則眾不二聽動無疑事則眾不二志古率民者未有不信其心而能得其力者也未有不得其力而能致其死戰者也故國必有禮信親愛之義則可以飢易飽國必有孝慈廉恥之俗則可以死易生古者率民必先禮信而後爵祿先廉恥而後刑罰先親愛而後律其身焉故戰者必本乎率身以勵眾士如心之使四支也志不勵則士不死節士不死節則眾不戰勵士之道民之所以生不可不厚也爵列之等死喪之親民之所以營不可不顯也必也因民所生而制之因民所榮而顯之田祿之實飲食之糧親戚同鄉鄉里相勸死生相救兵役相從此民之所勵也使什伍如親戚卒伯如朋友故兵止如堵墻動如風雨車不結轍士不旋踵此本戰之道也地所以養民也城所以守地也戰所以守城也故務耕者其民不飢務守者其地不危務戰者其城不圍三者先王之本務也本務者兵最急故先王務專於兵專於兵其本有五焉委積不多則士不行賞祿不厚則民不勸武士不選則眾不強備用不便則力不壯刑賞不中則眾不畏先王務此五者故靜能守其所固動能成其所欲夫以居攻出則居欲重陣欲堅發欲畢鬭欲齊王國富民霸國富士僅存之國富大夫亡國富倉府所謂上滿下漏患無所救故曰舉賢任能不時日而事利明法審令不卜筮而事吉貴功養勞不禱祠而得福又曰天時不如地利地利不如人和聖人所貴人事而已夫勤勞之師將不先己暑不張蓋寒不重衣有登降之險將必下步軍井成而後飲軍食熟而後飯軍壘成而後舍軍不畢食亦不火食飢飽勞佚寒暑必以身同之如此則師雖久而不老雖老不弊
