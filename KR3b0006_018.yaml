body:
  text: 勒卒令金鼓鈴旗四者各有法鼓之則進重鼓則擊金之則止重金則退鈴傳令也旗麾之左則左麾之右則右奇兵則反是一鼓一擊而左一鼓一擊而右一步一鼓步鼓也十步一鼓趨鼓也音不絶騖鼓也商將鼓也角帥鼓也小鼓伯鼓也三鼓同則將帥伯其心一也奇兵則反是鼓失次者有誅歡譁者有誅不聽金鼓鈴旗而動者有誅百人而教戰教成合之千人千人教成合之萬人萬人教成會之於三軍三軍之衆有分有合為大戰之法教成試之以閲方亦勝圓亦勝錯邪亦勝臨險亦勝敵在山緣而從之敵在淵沒而從之求敵若求亡子從之無疑故能敗敵而制其命夫蚤決先敵若計不先定慮不蚤決則進退不定疑生必敗故正兵貴先奇兵貴後或先或後制敵者也世將不知法者專命而行先擊而勇無不敗者也其舉有疑而不疑其往有信而不信其致有遲疾而不遲疾是三者戰之纍也
